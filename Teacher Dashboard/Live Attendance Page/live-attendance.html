<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Attendance | Hybrid Attendance System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="live-attendance.css">
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo"><div class="logo-icon">HAS</div><span>Attendance</span></div>
  <nav class="sidebar-nav">
    <a href="../teacher-dashboard.html" class="nav-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard
    </a>
    <a href="../Start Sesstion Page/start-session.html" class="nav-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>Start Session
    </a>
    <a href="live-attendance.html" class="nav-item active">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>Live Attendance
    </a>
    <a href="../Attendance Record Page/attendance-history.html" class="nav-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>Records
    </a>
  </nav>
  <button class="logout-btn" onclick="window.location.href='/Login-form/Login.html'">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout
  </button>
</div>

<div class="main-content">
  <header class="topbar">
    <div class="topbar-left">
      <h2>Live Attendance</h2>
      <p id="sessionInfo">No active session</p>
    </div>
    <div class="topbar-right">
      <div id="liveIndicator" class="live-badge" style="display:none">
        <span class="pulse-dot"></span> LIVE
      </div>
      <button class="refresh-btn" id="refreshBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23,4 23,10 17,10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Refresh
      </button>
    </div>
  </header>

  <!-- Stats bar -->
  <div class="stats-bar">
    <div class="stat-pill green">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20,6 9,17 4,12"/></svg>
      <span>Present: <strong id="presentNum">0</strong></span>
    </div>
    <div class="stat-pill red">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      <span>Absent: <strong id="absentNum">0</strong></span>
    </div>
    <div class="stat-pill orange">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      <span>Total: <strong id="totalNum">0</strong></span>
    </div>
    <div class="stat-pill purple">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>
      <span>Rate: <strong id="rateNum">—</strong></span>
    </div>
  </div>

  <div class="content-body">
    <div class="card">
      <div class="table-wrapper">
        <div class="att-table">
          <div class="att-head">
            <span>#</span><span>Student Name</span><span>Roll No</span>
            <span>Method</span><span>Time</span><span>Status</span>
          </div>
          <div id="attendanceBody">
            <!-- Populated by JS -->
          </div>
        </div>
        <div id="emptyState" class="empty-state">
          <div class="empty-icon">📋</div>
          <h3>No Attendance Data</h3>
          <p>Start a session and wait for students to join</p>
          <button class="go-start-btn" onclick="window.location.href='../Start Sesstion Page/start-session.html'">
            Start a Session
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="live-attendance.js"></script>
</body>
</html>

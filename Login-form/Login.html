<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login-Hybrid Attendance System</title>

  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <header class="top-bar">
    Hybrid Attendance System
  </header>

  <div class="login-container">
    <h1>Login</h1>

    <div class="role-selection">
      <button id="studentBtn" class="role-btn active">Student</button>
      <button id="teacherBtn" class="role-btn">Teacher</button>
      <button id="adminBtn" class="role-btn">Admin</button>
    </div>

    <form id="loginForm">
  <input type="email" id="email" placeholder="Email" required>
  <input type="password" id="password" placeholder="Password" required>
  <button type="submit" class="login-btn">Login</button>
</form>

    <p class="register-text">
      Don't have an account? <a href="/Register Page/Register.html">Register</a>
    </p>
  </div>

  <footer class="bottom-bar">
    © 2026 Smart Attendance System | All Rights Reserved
  </footer>

  <script src="./Function.js"></script>
</body>
</html>

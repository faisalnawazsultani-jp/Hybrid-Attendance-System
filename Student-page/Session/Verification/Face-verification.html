<!DOCTYPE html>
<html>
<head>
  <title>Face Verification</title>
  <link rel="stylesheet" href="./Verification.css">
</head>
<body>

<header class="top-bar">Face Verification</header>

<div class="container">
  <div class="card">
    <h2>Scan Your Face</h2>

    <div class="preview-box">
      Camera Preview Area
    </div>

    <button onclick="verifyFace()">Verify Face</button>
    <button class="back-btn" onclick="goBack()">Back</button>

    <p id="result"></p>
  </div>
</div>

<footer class="bottom-bar">© 2026 Smart Attendance System</footer>

<script>
function verifyFace(){
  localStorage.setItem("face", "1");

  alert("Face Verified ✅");
  window.location.href = "./Verification.html";
}

function goBack(){
  window.location.href="./Verification.html";
}
</script>

</body>
</html>
